{% extends "base.html" %}

{% block title %}로그인 - OneBank{% endblock %}

{% block content %}
<style>
    .login-container {
        max-width: 450px;
        margin: 80px auto;
        padding: 40px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 20px rgba(0,0,0,0.1);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .login-header h2 {
        color: #008485;
        margin-bottom: 10px;
        font-size: 28px;
    }
    
    .login-header p {
        color: #666;
        font-size: 14px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
        font-size: 14px;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #008485;
    }
    
    .login-btn {
        width: 100%;
        padding: 14px;
        background: #008485;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    
    .login-btn:hover {
        background: #006e6f;
    }
    
    .error-message {
        background: #f8d7da;
        color: #721c24;
        padding: 12px;
        border-radius: 5px;
        margin-bottom: 20px;
        border-left: 4px solid #dc3545;
        font-size: 14px;
    }
    
    .links {
        margin-top: 25px;
        text-align: center;
        font-size: 13px;
        color: #666;
    }
    
    .links a {
        color: #008485;
        text-decoration: none;
        margin: 0 10px;
    }
    
    .links a:hover {
        text-decoration: underline;
    }
    
    .demo-accounts {
        margin-top: 30px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 5px;
        border-left: 4px solid #17a2b8;
    }
    
    .demo-accounts h4 {
        margin: 0 0 10px 0;
        color: #17a2b8;
        font-size: 14px;
    }
    
    .demo-accounts ul {
        margin: 0;
        padding-left: 20px;
        font-size: 13px;
        color: #666;
    }
</style>

<div class="login-container">
    <div class="login-header">
        <h2>OneBank 로그인</h2>
        <p>안전한 인터넷뱅킹 서비스</p>
    </div>
    
    {% if error %}
    <div class="error-message">
        ⚠️ {{ error }}
    </div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">아이디:</label>
            <input type="text" id="username" name="username" required placeholder="아이디를 입력하세요" autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" required placeholder="비밀번호를 입력하세요">
        </div>
        
        <button type="submit" class="login-btn">로그인</button>
    </form>
    
    <div class="links">
        <a href="#">아이디 찾기</a> | 
        <a href="#">비밀번호 찾기</a> | 
        <a href="#">회원가입</a>
    </div>
</div>
{% endblock %}
