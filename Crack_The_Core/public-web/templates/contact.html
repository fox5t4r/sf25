{% extends "base.html" %}

{% block title %}고객센터 - OneBank{% endblock %}

{% block content %}
<style>
    .contact-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
    }
    
    .info-box {
        background: #e8f4f4;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
    }
    
    .info-box h3 {
        margin-top: 0;
        color: #008485;
    }
    
    .info-box p {
        margin: 10px 0;
        color: #333;
        line-height: 1.6;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
        box-sizing: border-box;
    }
    
    .form-group textarea {
        resize: vertical;
        min-height: 120px;
    }
    
    .submit-btn {
        background: #008485;
        color: white;
        padding: 14px 30px;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
    }
    
    .submit-btn:hover {
        background: #006e6f;
    }
    
    .success-box {
        background: #d4edda;
        color: #155724;
        padding: 20px;
        border-radius: 5px;
        margin-top: 20px;
        border-left: 4px solid #28a745;
    }
    
    .error-box {
        background: #f8d7da;
        color: #721c24;
        padding: 20px;
        border-radius: 5px;
        margin-top: 20px;
        border-left: 4px solid #dc3545;
    }
    
</style>

<div class="contact-container">
    <h1 style="color: #008485; margin-bottom: 10px;">고객 피드백</h1>
    <p style="color: #666; margin-bottom: 30px;">고객님의 소중한 의견을 듣습니다</p>
    
    <div class="info-box">
        <h3>피드백 시스템 안내</h3>
        <p>모든 피드백은 암호화된 채널을 통해 안전하게 전송됩니다.</p>
        <p>접수하신 피드백은 24시간 내에 검토되며, 필요시 이메일로 답변 드립니다.</p>
        <p style="margin-top: 15px; font-size: 13px;">
            <strong>기술 문의:</strong> api-support@Onebank.com
        </p>
    </div>
    
    <form id="feedbackForm">
        <div class="form-group">
            <label for="name">성함: *</label>
            <input type="text" id="name" required placeholder="홍길동">
        </div>
        
        <div class="form-group">
            <label for="email">이메일: *</label>
            <input type="email" id="email" required placeholder="example@email.com">
        </div>
        
        <div class="form-group">
            <label for="category">문의 유형: *</label>
            <select id="category">
                <option value="general">일반 문의</option>
                <option value="account">계좌 문의</option>
                <option value="technical">기술 지원</option>
                <option value="complaint">불만 사항</option>
                <option value="security">보안 문의</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="message">내용: *</label>
            <textarea id="message" rows="6" required placeholder="피드백 내용을 입력해주세요..."></textarea>
        </div>
        
        <button type="submit" class="submit-btn">피드백 제출</button>
    </form>
    
    <div id="result"></div>
</div>

<script>
document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        category: document.getElementById('category').value,
        message: document.getElementById('message').value
    };
    
    try {
        const response = await fetch('/api/submit-feedback', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (response.ok) {
            document.getElementById('result').innerHTML = 
                `<div class="success-box">
                    <p style="margin: 0 0 10px 0;"><strong>✓ ${result.message}</strong></p>
                    <p style="margin: 0;">접수번호: <strong>${result.reference_id}</strong></p>
                    ${result.note ? `<p style="margin: 10px 0 0 0; font-size: 13px; opacity: 0.8;">${result.note}</p>` : ''}
                </div>`;
            document.getElementById('feedbackForm').reset();
        } else {
            document.getElementById('result').innerHTML = 
                `<div class="error-box">
                    <p style="margin: 0;"><strong>오류: ${result.error}</strong></p>
                    ${result.details ? `<pre style="font-size: 12px; margin-top: 10px; opacity: 0.8; white-space: pre-wrap;">${result.details}</pre>` : ''}
                </div>`;
        }
        
    } catch (error) {
        document.getElementById('result').innerHTML = 
            `<div class="error-box">
                <p style="margin: 0;"><strong>네트워크 오류</strong></p>
                <p style="margin: 10px 0 0 0; font-size: 13px;">${error.message}</p>
            </div>`;
    }
});
</script>
{% endblock %}
